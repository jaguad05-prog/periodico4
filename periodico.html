/* ── API LOCAL (servidor .bat) ────────────────────── */
// El servidor corre en el mismo ordenador del profe en puerto 8000
// Los alumnos acceden por http://IP:8000/periodico.html
// La IP del servidor se detecta automáticamente desde la URL

function getServerBase(){
  const loc=window.location;
  // Funciona tanto en http (local) como en https (Render)
  if(loc.protocol==="https:"){
    return `https://${loc.hostname}`;
  }
  if(loc.protocol==="http:"){
    const port=loc.port||"80";
    return `http://${loc.hostname}:${port}`;
  }
  return null;
}

function fetchConTimeout(url,opts,ms=8000){
  return new Promise((resolve,reject)=>{
    const timer=setTimeout(()=>reject(new Error("Tiempo de espera agotado")),ms);
    fetch(url,opts).then(r=>{clearTimeout(timer);resolve(r);}).catch(e=>{clearTimeout(timer);reject(e);});
  });
}

function makeApi(base){
  return{
    async leer(grupo){
      const r=await fetchConTimeout(`${base}/${encodeURIComponent(grupo)}`);
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      return await r.json();
    },
    async guardar(grupo,data){
      const payload=limpiarImagenes(data);
      const r=await fetchConTimeout(`${base}/${encodeURIComponent(grupo)}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
      });
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      return true;
    }
  };
}

function limpiarImagenes(data){
  return{
    ...data,
    articles:(data.articles||[]).map(a=>({...a,image:a.image?"[foto-local]":null}))
  };
}

/* ── PANTALLA DE ENTRADA ──────────────────────────── */
function Entrada({onEntrar}){
  const[grupo,setGrupo]=useState("");

    if(!nombre.trim()){setError("Escribe tu nombre");return;}
    if(!base){setError("Abre el periódico desde la dirección del servidor, no como archivo local.");return;}
    setCargando(true);setError("");
    try{
      const api=makeApi(base);
      let existente=null;
      try{ existente=await api.leer(grupo.trim().toUpperCase()); }catch{}
      onEntrar(base,grupo.trim().toUpperCase(),nombre.trim(),existente);
    }catch(e){
      setError("Error al conectar: "+e.message);
    }finally{setCargando(false);}
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a2e,#0f3460)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:16,padding:"40px 36px",maxWidth:460,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.4)",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:8}}>🗞️</div>
        <h1 style={{fontFamily:"Georgia,serif",fontSize:30,fontWeight:900,color:"#111",marginBottom:4}}>EL DEPORTIVO</h1>
        <p style={{color:"#999",fontSize:12,letterSpacing:2,textTransform:"uppercase",marginBottom:28}}>Periódico Digital de Aula</p>

        {!base&&(
          <div style={{background:"#fff3cd",border:"1.5px solid #ffc107",borderRadius:8,padding:"12px 14px",marginBottom:20,textAlign:"left"}}>
            <p style={{fontSize:13,color:"#664d03",lineHeight:1.6}}>
              ⚠️ Abre el periódico desde la dirección del servidor:<br/>
              <code style={{fontWeight:700}}>http://IP-del-profe:8000/periodico.html</code><br/>
              No lo abras como archivo directamente.
            </p>
          </div>
        )}

        <label style={lSt}>NOMBRE DEL GRUPO</label>
        <input value={grupo} onChange={e=>setGrupo(e.target.value.toUpperCase())}
          onKeyDown={e=>e.key==="Enter"&&entrar()}

        <label style={lSt}>TU NOMBRE</label>

        {error&&<p style={{color:"#c8102e",fontWeight:700,fontSize:13,marginBottom:12,textAlign:"left",background:"#fff0f0",padding:"8px 12px",borderRadius:6,border:"1px solid #ffcdd2"}}>{error}</p>}

        <button onClick={entrar} disabled={cargando||!base} style={{...bPri,width:"100%",padding:14,fontSize:15,opacity:(cargando||!base)?0.5:1}}>

  );
}

/* ── BLOQUE DE TEXTO ──────────────────────────────── */
function BloqueTexto({block,onChange}){
  const ref=React.useRef(null);
  const lastHtml=React.useRef(block.content||"");

  React.useEffect(()=>{
    if(ref.current && ref.current.innerHTML !== (block.content||"")){
      const sel=window.getSelection();
      const range=sel&&sel.rangeCount>0?sel.getRangeAt(0):null;
      let start=0,end=0;
      if(range&&ref.current.contains(range.startContainer)){
        const pre=range.cloneRange();
        pre.selectNodeContents(ref.current);
        pre.setEnd(range.startContainer,range.startOffset);
        start=pre.toString().length;
        end=start+(range.toString().length);
      }
      ref.current.innerHTML=block.content||"";
      // Restore cursor
      try{
        const tw=document.createTreeWalker(ref.current,NodeFilter.SHOW_TEXT);
        let node,pos=0;
        const setAt=(target)=>{
          let n,p=0;
          const w=document.createTreeWalker(ref.current,NodeFilter.SHOW_TEXT);
          while(n=w.nextNode()){
            if(p+n.length>=target) return{node:n,offset:target-p};
            p+=n.length;
          }
          return null;
        };
        const s=setAt(start),e2=setAt(end);
        if(s&&e2){const r=document.createRange();r.setStart(s.node,s.offset);r.setEnd(e2.node,e2.offset);sel.removeAllRanges();sel.addRange(r);}
      }catch{}
    }
  },[block.content]);

  const onInput=()=>{
    const html=ref.current.innerHTML;
    lastHtml.current=html;
    onChange(html);
  };

  const fmt=(cmd)=>{
    ref.current.focus();
    document.execCommand(cmd,false,null);
    onChange(ref.current.innerHTML);
  };

  return(
    <div>
      <div style={{display:"flex",gap:5,marginBottom:5}}>
        <button type="button" onMouseDown={e=>{e.preventDefault();fmt("bold");}}
          style={{width:30,height:30,border:"1.5px solid #ddd",background:"#fff",cursor:"pointer",fontWeight:"bold",fontSize:13,borderRadius:4}}>N</button>
        <button type="button" onMouseDown={e=>{e.preventDefault();fmt("italic");}}
          style={{width:30,height:30,border:"1.5px solid #ddd",background:"#fff",cursor:"pointer",fontStyle:"italic",fontSize:13,borderRadius:4}}>K</button>
        <button type="button" onMouseDown={e=>{e.preventDefault();fmt("underline");}}
          style={{width:30,height:30,border:"1.5px solid #ddd",background:"#fff",cursor:"pointer",textDecoration:"underline",fontSize:13,borderRadius:4}}>S</button>
      </div>
      <div
        ref={ref}
        contentEditable
        suppressContentEditableWarning
        onInput={onInput}
        style={{minHeight:120,padding:"10px 12px",border:"2px solid #e0e0e0",borderRadius:6,outline:"none",lineHeight:1.7,fontSize:15,fontFamily:"Georgia,serif",background:"#fafafa"}}
      />
    </div>
  );
}

/* ── EDITOR DE BLOQUES ────────────────────────────── */
function EditorBloques({blocks,onChange}){
  const mv=(i,d)=>{const b=[...blocks];const j=i+d;if(j<0||j>=b.length)return;[b[i],b[j]]=[b[j],b[i]];onChange(b);};
  const rm=(i)=>onChange(blocks.filter((_,x)=>x!==i));
  const up=(i,v)=>onChange(blocks.map((b,x)=>x===i?v:b));
  const ins=(i,b)=>{const nb=[...blocks];nb.splice(i+1,0,b);onChange(nb);};
  return(
    <div>
      {blocks.length===0&&(
        <div style={{display:"flex",gap:8,justifyContent:"center",margin:"10px 0"}}>
          <button onClick={()=>onChange([mkT()])} style={{...addBtn,background:"#f0f0f0",color:"#333",borderColor:"#ccc"}}>+ Añadir párrafo</button>
          <button onClick={()=>onChange([mkTw()])} style={{...addBtn,background:"#e8f4fd",color:"#1da1f2",borderColor:"#1da1f2"}}>🐦 Añadir tuit</button>
        </div>
      )}
      {blocks.map((bl,i)=>(
        <div key={bl.id}>
          <div style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:4}}>
            <div style={{display:"flex",flexDirection:"column",gap:3,paddingTop:4,flexShrink:0}}>
              <button onClick={()=>mv(i,-1)} disabled={i===0} style={{...ctrlBtn,opacity:i===0?0.25:1}}>▲</button>
              <button onClick={()=>mv(i,1)} disabled={i===blocks.length-1} style={{...ctrlBtn,opacity:i===blocks.length-1?0.25:1}}>▼</button>
              <button onClick={()=>rm(i)} style={{...ctrlBtn,background:"#fee",color:"#c8102e",borderColor:"#fcc"}}>✕</button>
            </div>
            <div style={{flex:1}}>
              {bl.type==="text"?<BloqueTexto block={bl} onChange={v=>up(i,{...bl,content:v})}/>:<BloqueTuit block={bl} onChange={v=>up(i,v)}/>}
            </div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"center",padding:"5px 0 8px",borderBottom:"1px dashed #e0e0e0",marginBottom:6}}>
            <button onClick={()=>ins(i,mkT())} style={{...addBtn,background:"#f5f5f5",color:"#555",borderColor:"#ccc"}}>+ Párrafo aquí ↓</button>
            <button onClick={()=>ins(i,mkTw())} style={{...addBtn,background:"#e8f4fd",color:"#1da1f2",borderColor:"#1da1f2"}}>🐦 Tuit aquí ↓</button>
          </div>
        </div>
      ))}
    </div>
  );
}

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:1000,overflowY:"auto",padding:"20px 0"}}>
      <div style={{maxWidth:760,margin:"0 auto",background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>

        <div style={{display:"inline-block",background:color,color:"#fff",padding:"3px 10px",fontWeight:900,fontSize:11,letterSpacing:2,marginBottom:16,fontFamily:"sans-serif"}}>{article.section}</div>
        <h1 style={{fontSize:"clamp(24px,4vw,38px)",fontWeight:900,lineHeight:1.15,color:"#111",margin:"0 0 12px",fontFamily:"Georgia,serif"}}>{article.title}</h1>
        <p style={{fontSize:19,color:"#444",lineHeight:1.5,margin:"0 0 20px",fontFamily:"Georgia,serif",borderLeft:`4px solid ${color}`,paddingLeft:14}}>{article.subtitle}</p>
        <div style={{display:"flex",gap:16,alignItems:"center",borderTop:"1px solid #eee",borderBottom:"1px solid #eee",padding:"10px 0",marginBottom:24,fontSize:13,color:"#666"}}>
          <span style={{fontWeight:700,color:"#111"}}>{article.author}</span>
          <span>·</span><span>{now}</span>
          {!article.published&&<span style={{marginLeft:"auto",background:"#ffc107",color:"#000",padding:"2px 8px",borderRadius:4,fontWeight:700,fontSize:11}}>BORRADOR</span>}
        </div>
        {img&&<div style={{marginBottom:28}}><img src={img} alt={article.imageCaption} style={{width:"100%",maxHeight:440,objectFit:"cover",display:"block"}}/>{article.imageCaption&&<p style={{fontSize:12,color:"#666",margin:"6px 0 0",fontStyle:"italic",borderLeft:"2px solid #ccc",paddingLeft:8}}>{article.imageCaption}</p>}</div>}
        {article.image==="[foto-local]"&&<div style={{background:"#f5f5f5",height:160,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:28,borderRadius:4}}><span style={{color:"#bbb",fontSize:13}}>📷 Foto visible solo en el ordenador que la subió</span></div>}
        {blocks.map(b=>(
          <div key={b.id}>
            {b.type==="text"
              ?<div style={{fontSize:17,lineHeight:1.8,color:"#222",fontFamily:"Georgia,serif",marginBottom:16}} dangerouslySetInnerHTML={{__html:b.content?.replace(/\n/g,"<br/>")}}/>
              :<TarjetaTuit tweet={b}/>}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── TARJETA DE PORTADA ───────────────────────────── */
function TarjetaPortada({article,index,onClick,onEditar,photoRight}){
  const color=COL[article.section]||"#c8102e";
  const isMain=index===0;
  const[hover,setHover]=useState(false);
  const img=article.image&&article.image!=="[foto-local]"?article.image:null;
  const imgStyle={width:90,minHeight:100,objectFit:"cover",flexShrink:0,objectPosition:article.imagePosition||"center"};
  return(
    <div onClick={onClick}
      style={{cursor:"pointer",background:hover?"#fafafa":"#fff",overflow:"hidden",position:"relative",borderBottom:isMain?"none":"1px solid #eee",transition:"background 0.15s"}}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
      {isMain?(
        <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
          {img?<div style={{overflow:"hidden",height:340,flexShrink:0}}><img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block",objectPosition:article.imagePosition||"center"}}/></div>
              :<div style={{height:220,flexShrink:0,background:"linear-gradient(135deg,#1a1a1a,#333)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"rgba(255,255,255,0.1)",fontSize:64}}>📷</span></div>}
          <div style={{padding:"12px 16px 10px",flex:1}}>
            <div style={{display:"inline-block",color,fontWeight:900,fontSize:11,letterSpacing:1.5,marginBottom:6,fontFamily:"sans-serif"}}>{article.section}</div>
            <h2 style={{fontSize:"clamp(22px,3.5vw,36px)",fontWeight:900,lineHeight:1.1,color:"#111",margin:"0 0 8px",fontFamily:"Georgia,serif"}}>{article.title}</h2>
            <p style={{fontSize:15,color:"#444",lineHeight:1.5,margin:"0 0 8px",fontFamily:"Georgia,serif"}}>{article.subtitle}</p>
            <div style={{fontSize:12,color:"#888",fontWeight:700}}>{article.author}{!article.published&&<span style={{marginLeft:10,background:"#ffc107",color:"#000",padding:"2px 7px",fontSize:10,fontWeight:700}}>BORRADOR</span>}</div>
          </div>
        </div>
      ):(
        <div style={{display:"flex",minHeight:100,flexDirection:photoRight?"row-reverse":"row"}}>
          {img&&<img src={img} alt="" style={imgStyle}/>}
          <div style={{padding:"10px 12px",flex:1}}>
            <div style={{display:"inline-block",background:color,color:"#fff",padding:"1px 6px",fontWeight:900,fontSize:9,letterSpacing:2,marginBottom:5,fontFamily:"sans-serif"}}>{article.section}</div>
            <h3 style={{fontSize:14,fontWeight:800,lineHeight:1.25,color:"#111",margin:"0 0 4px",fontFamily:"Georgia,serif"}}>{article.title}</h3>
            <p style={{fontSize:11.5,color:"#666",margin:0,lineHeight:1.35}}>{article.subtitle}</p>
            {!article.published&&<span style={{marginTop:5,display:"inline-block",background:"#ffc107",color:"#000",padding:"1px 6px",fontSize:9,fontWeight:700}}>BORRADOR</span>}
          </div>
        </div>
      )}
      {hover&&<button onClick={e=>{e.stopPropagation();onEditar();}} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.8)",color:"#fff",border:"none",cursor:"pointer",padding:"5px 12px",borderRadius:4,fontSize:11,fontWeight:700}}>✏️ EDITAR</button>}
    </div>
  );
}

/* ── APP PRINCIPAL ────────────────────────────────── */
function App(){
  const[blobId,setBlobId]=useState(null);
  const[nombre,setNombre]=useState("");
  const[articles,setArticles]=useState([]);
  const[paperName,setPaperName]=useState("EL DEPORTIVO");
  const[editando,setEditando]=useState(null);
  const[leyendo,setLeyendo]=useState(null);
  const[syncStatus,setSyncStatus]=useState("ok");
  const[lastSaved,setLastSaved]=useState(null);
  const apiRef   = useRef(null);
  const grupoRef = useRef(null);
  const pollRef  = useRef(null);
  const stRef    = useRef({});

  useEffect(()=>{stRef.current={articles,paperName};},[articles,paperName]);
  useEffect(()=>()=>{if(pollRef.current)clearInterval(pollRef.current);},[]);

  const startPoll=useCallback((api,grp)=>{
    if(pollRef.current)clearInterval(pollRef.current);
    pollRef.current=setInterval(async()=>{
      try{
        const r=await apiRef.current.leer(grupoRef.current);
        if(!r||!r.articles)return;
        const cur=stRef.current;
        const remoteKey=JSON.stringify((r.articles||[]).map(a=>({...a,image:null})));
        const localKey=JSON.stringify((cur.articles||[]).map(a=>({...a,image:null})));
        if(remoteKey!==localKey){
          setArticles(prev=>{
            const imgMap=Object.fromEntries(prev.map(a=>[a.id,a.image]));
            return(r.articles||[]).map(a=>({...a,image:a.image==="[foto-local]"?(imgMap[a.id]||"[foto-local]"):a.image}));
          });
        }
        if(r.paperName&&r.paperName!==cur.paperName)setPaperName(r.paperName);
      }catch{}
    },5000);
  },[]);

  const entrar=async(base,grp,nom,existente)=>{
    const api=makeApi(base);
    apiRef.current=api;
    grupoRef.current=grp;
    setBlobId(grp);setNombre(nom);
    if(existente&&existente.articles){
      setArticles(existente.articles);
      setPaperName(existente.paperName||"EL DEPORTIVO");
    }else{
      const def=DEF();setArticles(def);setPaperName("EL DEPORTIVO");
      try{await api.guardar(grp,{articles:def,paperName:"EL DEPORTIVO"});}catch{}
    }
    startPoll(api,grp);
  };

  const push=async(arts,pn)=>{
    const api=apiRef.current;
    const grp=grupoRef.current;
    if(!api||!grp){setSyncStatus("error");return;}
    setSyncStatus("saving");
    try{
      await api.guardar(grp,{articles:arts,paperName:pn});
      setSyncStatus("ok");
      setLastSaved(new Date());
      // Actualizar stRef inmediatamente para que el poll no machaque
      stRef.current={articles:arts,paperName:pn};
    }catch(e){
      setSyncStatus("error");
      console.error("Error guardando:",e);
    }
  };

  const guardarNoticia=async(updated)=>{
    const next=articles.map(x=>x.id===updated.id?updated:x);
    // Actualizar stRef ANTES de setArticles para evitar race condition con el poll
    stRef.current={...stRef.current,articles:next};
    setArticles(next);
    setEditando(null);
    await push(next,paperName);
  };

  if(!blobId)return <Entrada onEntrar={entrar}/>;

  if(leyendo!==null){
    const art=articles.find(a=>a.id===leyendo);
    return <LectorNoticia article={art} onVolver={()=>setLeyendo(null)} onEditar={()=>{setEditando(art);setLeyendo(null);}}/>;
  }

  const today=new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const syncLabel={ok:"✅ Guardado",saving:"💾 Guardando...",error:"⚠️ Error — no se guardó"}[syncStatus];
  const syncColor={ok:"#2e7d32",saving:"#e87722",error:"#c8102e"}[syncStatus];

  return(
    <div style={{minHeight:"100vh",background:"#f5f5f5"}}>
      <header style={{background:"#fff",borderBottom:"3px solid #c8102e"}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:"0 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #eee",padding:"6px 0",fontSize:12,color:"#666",flexWrap:"wrap",gap:6}}>
            <span style={{textTransform:"capitalize"}}>{today}</span>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{fontWeight:700,color:syncColor,fontSize:11}}>{syncLabel}</span>
              {lastSaved&&<span style={{color:"#bbb",fontSize:10}}>{lastSaved.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}</span>}
              <span style={{background:"#111",color:"#fff",padding:"2px 10px",borderRadius:20,fontWeight:800,fontSize:11}}>👤 {nombre}</span>
              <button onClick={()=>{if(pollRef.current)clearInterval(pollRef.current);setBlobId(null);}} style={{background:"none",border:"1px solid #ddd",cursor:"pointer",fontSize:10,padding:"2px 8px",borderRadius:4,color:"#999"}}>Salir</button>
            </div>
          </div>
          <div style={{textAlign:"center",padding:"18px 0 14px"}}>
            <div contentEditable suppressContentEditableWarning
              onBlur={async e=>{const v=e.target.innerText;setPaperName(v);await push(articles,v);}}
              style={{fontSize:"clamp(36px,8vw,72px)",fontWeight:900,letterSpacing:"-2px",color:"#111",lineHeight:1,fontFamily:"Georgia,serif",cursor:"text",outline:"none",display:"inline-block"}}>
              {paperName}
            </div>
            <div style={{fontSize:11,color:"#999",letterSpacing:3,textTransform:"uppercase",marginTop:4}}>Periódico Deportivo Digital · Haz clic en el nombre para editarlo</div>
          </div>
          <div style={{display:"flex",borderTop:"2px solid #c8102e",overflowX:"auto"}}>
            {SEC.map(s=><div key={s} style={{padding:"6px 14px",fontSize:11.5,fontWeight:700,color:"#333",letterSpacing:1,borderRight:"1px solid #eee",whiteSpace:"nowrap"}}>{s}</div>)}
          </div>
        </div>
      </header>

      <main style={{maxWidth:1100,margin:"0 auto",padding:20}}>
        {articles.length>0&&(
          <div style={{display:"grid",gridTemplateColumns:"4fr 220px",background:"#fff",border:"1px solid #e0e0e0",marginBottom:20,minHeight:420}}>
            <div style={{borderRight:"1px solid #e0e0e0"}}>
              <TarjetaPortada article={articles[0]} index={0} onClick={()=>setLeyendo(articles[0].id)} onEditar={()=>setEditando(articles[0])}/>
            </div>
            <div>
              {articles.slice(1).map((art,i)=>(
                <div key={art.id} style={{borderBottom:i<2?"1px solid #e0e0e0":"none"}}>
                  <TarjetaPortada article={art} index={i+1} photoRight={i===0||i===2} onClick={()=>setLeyendo(art.id)} onEditar={()=>setEditando(art)}/>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{background:"#e8f4fd",border:"1px solid #90caf9",borderRadius:8,padding:"12px 18px",fontSize:13,color:"#0d47a1"}}>
          <strong>🔄 SINCRONIZACIÓN:</strong> Los cambios de texto y tuits se guardan automáticamente. Los compañeros los ven en ~5 segundos. Las fotos solo se ven en el ordenador que las subió.
        </div>
      </main>

      {editando&&<EditorNoticia article={editando} onGuardar={guardarNoticia} onCancelar={()=>setEditando(null)}/>}
    </div>
  );
}

/* ── ESTILOS ──────────────────────────────────────── */
const iSt={width:"100%",padding:"8px 12px",border:"2px solid #e0e0e0",borderRadius:6,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:14,fontFamily:"Georgia,serif",display:"block"};
const lSt={display:"block",fontSize:11,fontWeight:800,letterSpacing:1.5,color:"#666",marginBottom:4,textTransform:"uppercase"};
const bPri={background:"#c8102e",color:"#fff",border:"none",cursor:"pointer",padding:"10px 22px",fontWeight:800,fontSize:14,borderRadius:6};
const bSec={background:"#f0f0f0",color:"#333",border:"2px solid #ddd",cursor:"pointer",padding:"8px 18px",fontWeight:700,fontSize:13,borderRadius:6};
const ctrlBtn={width:26,height:26,border:"1.5px solid #ddd",background:"#fff",cursor:"pointer",fontSize:11,borderRadius:4,padding:0,display:"flex",alignItems:"center",justifyContent:"center"};
const addBtn={padding:"4px 12px",border:"1.5px dashed",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
